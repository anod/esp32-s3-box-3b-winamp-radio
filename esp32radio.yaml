# ESP32-S3-BOX-3 Internet Radio
# ESP-IDF + ESP-GMF audio pipeline, Winamp 2 display, BT speaker bridge

esphome:
  name: esp32radio
  friendly_name: "ESP32 Radio"
  platformio_options:
    build_flags:
      - -O2
      - -DBOARD_HAS_PSRAM

esp32:
  board: esp32s3box
  flash_size: 16MB
  framework:
    type: esp-idf
    sdkconfig_options:
      # ESP-GMF: disable built-in HTTP IO (we register our own with cert bundle)
      CONFIG_ESP_AUDIO_SIMPLE_PLAYER_HTTP_EN: "n"
      # Disable resampler (we handle sample rate via I2S reconfig)
      CONFIG_ESP_AUDIO_SIMPLE_PLAYER_RESAMPLE_EN: "n"
      # Disable file/flash IO (not needed)
      CONFIG_ESP_AUDIO_SIMPLE_PLAYER_FILE_EN: "n"
      CONFIG_ESP_AUDIO_SIMPLE_PLAYER_EMBED_FLASH_EN: "n"
      # Enable TLS cert bundle for HTTPS streams
      CONFIG_MBEDTLS_CERTIFICATE_BUNDLE: "y"
      CONFIG_MBEDTLS_CERTIFICATE_BUNDLE_DEFAULT_FULL: "y"

psram:
  mode: octal
  speed: 80MHz

external_components:
  - source:
      type: local
      path: components

logger:
  level: DEBUG

api:
  encryption:
    key: !secret esp32radio_api_key

ota:
  - platform: esphome
    password: !secret esp32radio_ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

i2c:
  sda: GPIO8
  scl: GPIO18
  scan: false

# ES8311 codec — configured in internet_radio setup() via esp_codec_dev

# --- Custom Components ---

media_player:
  - platform: internet_radio
    id: radio
    name: "ESP32 Radio"
    # I2S0 pins (to ES8311 codec)
    i2s_bclk_pin: 17
    i2s_lrclk_pin: 45
    i2s_dout_pin: 15
    i2s_mclk_pin: 2
    # Power amplifier enable
    pa_pin: 46
    # Default volume (0-21)
    default_volume: 15
    # HA entity references (publish-on-change from C++)
    now_playing_id: now_playing
    station_select_id: station_select

switch:
  - platform: i2s_bridge
    id: bt_speaker
    name: "BT Speaker"
    restore_mode: RESTORE_DEFAULT_OFF
    bclk_pin: 10
    lrck_pin: 14
    dout_pin: 11
    pa_pin: 46

# --- Winamp 2 Display ---

winamp_display:
  id: display
  radio_id: radio
  bridge_id: bt_speaker
  brightness: 160
  brightness_number_id: screen_brightness

# --- Hardware Buttons ---

binary_sensor:
  - platform: gpio
    name: "Boot Button"
    id: boot_button
    pin:
      number: GPIO0
      mode: INPUT_PULLUP
      inverted: true  # active LOW
    internal: true
    on_press:
      - lambda: id(display).cycle_brightness();

  - platform: gpio
    name: "Mute Switch"
    id: mute_switch
    pin:
      number: GPIO1
      mode: INPUT_PULLDOWN
    internal: true
    on_state:
      - lambda: |-
          auto call = id(radio).make_call();
          if (x) {
            call.set_command(esphome::media_player::MEDIA_PLAYER_COMMAND_MUTE);
          } else {
            call.set_command(esphome::media_player::MEDIA_PLAYER_COMMAND_UNMUTE);
          }
          call.perform();

# --- HA Entities (song title, station picker, controls) ---

button:
  - platform: template
    name: "Next Station"
    icon: "mdi:skip-next"
    on_press:
      - lambda: id(radio).next_station_();

  - platform: template
    name: "Previous Station"
    icon: "mdi:skip-previous"
    on_press:
      - lambda: id(radio).prev_station_();

text_sensor:
  - platform: template
    name: "Now Playing"
    id: now_playing
    icon: "mdi:music-note"
    update_interval: never

select:
  - platform: template
    name: "Station"
    id: station_select
    icon: "mdi:radio"
    options:
      - "Groove Salad"
      - "Enigmatic Station 1"
      - "Psytrance"
      - "Rock Antenne"
      - "181 Hard Rock"
      - "Heavy Metal"
      - "181 Power Hits"
      - "KROQ"
      - "BBC World News"
      - "NPR News"
    set_action:
      - lambda: |-
          const auto &opts = id(station_select).traits.get_options();
          for (int i = 0; i < (int)opts.size(); i++) {
            if (opts[i] == x) {
              id(radio).set_station(i);
              break;
            }
          }
    update_interval: never

number:
  - platform: template
    name: "Screen Brightness"
    id: screen_brightness
    icon: "mdi:brightness-6"
    min_value: 1
    max_value: 255
    step: 1
    set_action:
      - lambda: id(display).set_brightness((int)x);
    update_interval: never
