# ESP32-S3-BOX-3 Internet Radio — ESPHome PoC
# Proves audio streaming works under ESPHome framework

esphome:
  name: esp32radio
  friendly_name: "ESP32 Radio"
  platformio_options:
    lib_deps:
      - https://github.com/schreibfaul1/ESP32-audioI2S.git
    build_flags:
      - -O2
      - -DARDUINO_ESP32_S3_BOX
      - -DBOARD_HAS_PSRAM
      - -DCORE_DEBUG_LEVEL=2

esp32:
  board: esp32s3box
  flash_size: 16MB
  framework:
    type: arduino

psram:
  mode: octal
  speed: 80MHz

external_components:
  - source: components

logger:
  level: DEBUG

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "ESP32Radio-AP"
    password: !secret ap_password

captive_portal:

web_server:
  port: 80

i2c:
  sda: GPIO8
  scl: GPIO18
  scan: false

# ES8311 codec — replaces custom 394-LOC driver
audio_dac:
  - platform: es8311
    id: es8311_dac
    bits_per_sample: 16bit
    sample_rate: 44100
    use_mclk: true
    use_microphone: false

# --- Custom Components ---

media_player:
  - platform: internet_radio
    id: radio
    name: "ESP32 Radio"
    # I2S0 pins (to ES8311 codec)
    i2s_bclk_pin: 17
    i2s_lrclk_pin: 45
    i2s_dout_pin: 15
    i2s_mclk_pin: 2
    # Power amplifier enable
    pa_pin: 46
    # Default volume (0-21)
    default_volume: 15

switch:
  - platform: i2s_bridge
    id: bt_speaker
    name: "BT Speaker"
    restore_mode: RESTORE_DEFAULT_OFF
    bclk_pin: 10
    lrck_pin: 14
    dout_pin: 11
    pa_pin: 46

# --- HA Entities (song title, station picker, controls) ---

button:
  - platform: template
    name: "Next Station"
    icon: "mdi:skip-next"
    on_press:
      - lambda: id(radio).next_station_();

  - platform: template
    name: "Previous Station"
    icon: "mdi:skip-previous"
    on_press:
      - lambda: id(radio).prev_station_();

text_sensor:
  - platform: template
    name: "Now Playing"
    id: now_playing
    icon: "mdi:music-note"
    update_interval: 3s
    lambda: |-
      return std::string(id(radio).get_song_title());

select:
  - platform: template
    name: "Station"
    id: station_select
    icon: "mdi:radio"
    options:
      - "Groove Salad"
      - "Enigmatic Station 1"
      - "Psytrance"
      - "Rock Antenne"
      - "181 Hard Rock"
      - "Heavy Metal"
      - "181 Power Hits"
      - "KROQ"
      - "BBC World News"
      - "NPR News"
    set_action:
      - lambda: |-
          const auto &opts = id(station_select).traits.get_options();
          for (int i = 0; i < (int)opts.size(); i++) {
            if (opts[i] == x) {
              id(radio).set_station(i);
              break;
            }
          }
    lambda: |-
      int idx = id(radio).get_current_station();
      const auto &opts = id(station_select).traits.get_options();
      if (idx >= 0 && idx < (int)opts.size())
        return opts[idx];
      return std::string("Unknown");
    update_interval: 3s
