; ESP32-WROOM-32D I2S→A2DP Bridge
; Receives PCM audio over I2S from ESP32-S3-BOX-3 radio,
; streams to Bluetooth speaker via A2DP source.

[env:bt-bridge]
platform = espressif32
board = esp32dev
framework = arduino

build_flags =
    -DCORE_DEBUG_LEVEL=3
    -O2

board_build.partitions = huge_app.csv

lib_deps =
    https://github.com/pschatzmann/ESP32-A2DP.git

; Load BT speaker name from ../.env (optional, overrides BT_SINK_NAME)
extra_scripts = pre:load_env.py

monitor_speed = 115200
upload_speed = 921600
